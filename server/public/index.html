<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 控制面板</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <!-- Markdown 解析器 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 自定义黑白灰主题 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .message-user {
            background-color: #f3f4f6;
            border-left: 4px solid #6b7280;
        }
        .message-assistant {
            background-color: #f9fafb;
            border-left: 4px solid #374151;
        }
        .message-tool {
            background-color: #f1f5f9;
            border-left: 4px solid #475569;
        }
        .message-reasoning {
            background-color: #f8fafc;
            border-left: 4px solid #64748b;
            font-style: italic;
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-active {
            background-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .status-inactive {
            background-color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Agent 控制面板</h1>
            <p class="text-gray-600 mt-2">基于 Hono + Deno 的 Agent 管理界面</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧：会话管理 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- 会话控制 -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">会话管理</h2>
                    
                    <div class="space-y-4">
                        <button id="createSessionBtn" 
                                class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-3 px-4 rounded-lg transition duration-200">
                            创建新会话
                        </button>
                        
                        <div class="border-t border-gray-200 pt-4">
                            <h3 class="font-medium text-gray-700 mb-2">活跃会话</h3>
                            <div id="sessionsList" class="space-y-2 max-h-60 overflow-y-auto scrollbar-thin">
                                <!-- 会话列表将通过JS动态填充 -->
                                <div class="text-gray-500 text-sm py-4 text-center">暂无活跃会话</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 会话控制 -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">会话控制</h2>
                    
                    <div id="sessionControls" class="space-y-3 hidden">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-700">当前会话:</span>
                            <span id="currentSessionId" class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">-</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button id="startBtn" 
                                    class="bg-gray-700 hover:bg-gray-800 text-white font-medium py-2 px-4 rounded transition duration-200">
                                启动 Agent
                            </button>
                            <button id="stopBtn" 
                                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded transition duration-200">
                                停止 Agent
                            </button>
                        </div>
                        
                        <button id="deleteSessionBtn" 
                                class="w-full bg-red-50 hover:bg-red-100 text-red-700 font-medium py-2 px-4 rounded border border-red-200 transition duration-200">
                            删除会话
                        </button>
                        
                        <button id="clearHistoryBtn" 
                                class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded border border-gray-300 transition duration-200">
                            清除历史
                        </button>
                    </div>
                    
                    <div id="noSessionMessage" class="text-gray-500 text-sm">
                        请选择一个会话来查看控制选项
                    </div>
                </div>

                <!-- 系统状态 -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">系统状态</h2>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-700">后端连接:</span>
                            <span id="backendStatus" class="flex items-center">
                                <span class="status-dot status-inactive"></span>
                                <span class="text-sm">未连接</span>
                            </span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-700">事件流:</span>
                            <span id="eventStreamStatus" class="flex items-center">
                                <span class="status-dot status-inactive"></span>
                                <span class="text-sm">未连接</span>
                            </span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-700">会话数量:</span>
                            <span id="sessionCount" class="font-medium">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中间：消息界面 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 消息输入 -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">消息输入</h2>
                    <div class="space-y-4">
                        <textarea id="messageInput" 
                                  placeholder="输入您的消息..."
                                  rows="3"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500 focus:border-transparent resize-none"
                                  disabled></textarea>
                        
                        <div class="flex justify-between items-center">
                            <div class="text-sm text-gray-500">
                                <span id="charCount">0</span>/1000 字符
                            </div>
                            <button id="sendMessageBtn" 
                                    class="bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-6 rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    disabled>
                                发送消息
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 对话历史 -->
                <div class="bg-white rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-semibold text-gray-800">对话历史</h2>
                            <div class="text-sm text-gray-500">
                                <span id="messageCount">0</span> 条消息
                            </div>
                        </div>
                    </div>
                    
                    <div id="messagesContainer" class="p-6 max-h-[500px] overflow-y-auto scrollbar-thin">
                        <div class="text-gray-500 text-center py-8">
                            选择会话以查看历史消息
                        </div>
                    </div>
                </div>

            <!-- 实时事件流已融合到对话历史中 -->
            </div>
        </div>

        <!-- 底部状态栏 -->
        <footer class="mt-8 pt-4 border-t border-gray-200">
            <div class="flex justify-between items-center text-sm text-gray-500">
                <div>Agent 控制面板 v1.0</div>
                <div id="currentTime">--:--:--</div>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script>
        // 全局状态
        let state = {
            currentSessionId: null,
            sessions: [],
            eventSource: null,
            autoScroll: true,
            currentAssistantMessage: null,  // 当前正在流式输出的assistant消息元素
            reasoningBuffer: '',            // 当前推理内容的缓冲区
            llmBuffer: '',                  // 当前LLM回复内容的缓冲区
            toolCallsBuffer: []             // 当前工具调用的缓冲区
        };

        // DOM元素
        const elements = {
            createSessionBtn: document.getElementById('createSessionBtn'),
            sessionsList: document.getElementById('sessionsList'),
            sessionControls: document.getElementById('sessionControls'),
            noSessionMessage: document.getElementById('noSessionMessage'),
            currentSessionId: document.getElementById('currentSessionId'),
            startBtn: document.getElementById('startBtn'),
            stopBtn: document.getElementById('stopBtn'),
            deleteSessionBtn: document.getElementById('deleteSessionBtn'),
            clearHistoryBtn: document.getElementById('clearHistoryBtn'),
            messageInput: document.getElementById('messageInput'),
            sendMessageBtn: document.getElementById('sendMessageBtn'),
            charCount: document.getElementById('charCount'),
            messagesContainer: document.getElementById('messagesContainer'),
            messageCount: document.getElementById('messageCount'),
            backendStatus: document.getElementById('backendStatus'),
            eventStreamStatus: document.getElementById('eventStreamStatus'),
            sessionCount: document.getElementById('sessionCount'),
            currentTime: document.getElementById('currentTime')
        };

        // API基础URL
        const API_BASE = '/api';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
            updateTime();
            setInterval(updateTime, 1000);
            checkBackendConnection();
            loadSessions();
        });

        // 初始化事件监听器
        function initEventListeners() {
            // 会话管理
            elements.createSessionBtn.addEventListener('click', createSession);
            elements.startBtn.addEventListener('click', startAgent);
            elements.stopBtn.addEventListener('click', stopAgent);
            elements.deleteSessionBtn.addEventListener('click', deleteSession);
            elements.clearHistoryBtn.addEventListener('click', clearHistory);

            // 消息输入
            elements.messageInput.addEventListener('input', handleMessageInput);
            elements.sendMessageBtn.addEventListener('click', sendMessage);
            elements.messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!elements.sendMessageBtn.disabled) {
                        sendMessage();
                    }
                }
            });

            // 自动滚动
            elements.messagesContainer.addEventListener('scroll', () => {
                const { scrollTop, scrollHeight, clientHeight } = elements.messagesContainer;
                state.autoScroll = scrollTop + clientHeight >= scrollHeight - 10;
            });
        }

        // 更新当前时间
        function updateTime() {
            const now = new Date();
            elements.currentTime.textContent = now.toLocaleTimeString('zh-CN');
        }

        // 检查后端连接
        async function checkBackendConnection() {
            try {
                const response = await fetch(`${API_BASE}/`);
                if (response.ok) {
                    updateStatus(elements.backendStatus, '已连接', true);
                    return true;
                }
            } catch (error) {
                console.error('后端连接失败:', error);
            }
            updateStatus(elements.backendStatus, '连接失败', false);
            return false;
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/sessions`);
                if (response.ok) {
                    const data = await response.json();
                    state.sessions = data.sessions || [];
                    renderSessionsList();
                    updateSessionCount();
                    
                    // 如果有当前选中的会话，确保它仍然存在
                    if (state.currentSessionId && !state.sessions.find(s => s.id === state.currentSessionId)) {
                        selectSession(null);
                    }
                }
            } catch (error) {
                console.error('加载会话失败:', error);
            }
        }

        // 渲染会话列表
        function renderSessionsList() {
            elements.sessionsList.innerHTML = '';
            
            if (state.sessions.length === 0) {
                elements.sessionsList.innerHTML = `
                    <div class="text-gray-500 text-sm py-4 text-center">
                        暂无活跃会话
                    </div>
                `;
                return;
            }

            state.sessions.forEach(session => {
                const isActive = session.id === state.currentSessionId;
                const sessionElement = document.createElement('div');
                sessionElement.className = `p-3 rounded-lg cursor-pointer transition duration-200 ${isActive ? 'bg-gray-100 border border-gray-300' : 'hover:bg-gray-50'}`;
                sessionElement.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center">
                            <span class="status-dot ${isActive ? 'status-active' : 'status-inactive'}"></span>
                            <span class="font-medium text-gray-800 truncate max-w-[200px]">${session.id.substring(0, 8)}...</span>
                        </div>
                        <div class="text-xs text-gray-500">
                            ${session.active ? '活跃' : '已停止'}
                        </div>
                    </div>
                `;
                
                sessionElement.addEventListener('click', () => selectSession(session.id));
                elements.sessionsList.appendChild(sessionElement);
            });
        }

        // 选择会话
        async function selectSession(sessionId) {
            state.currentSessionId = sessionId;
            
            if (sessionId) {
                elements.sessionControls.classList.remove('hidden');
                elements.noSessionMessage.classList.add('hidden');
                elements.currentSessionId.textContent = sessionId.substring(0, 12) + '...';
                elements.messageInput.disabled = false;
                elements.sendMessageBtn.disabled = false;
                
                // 加载历史消息
                await loadHistory(sessionId);
                
                // 连接事件流
                connectEventStream(sessionId);
            } else {
                elements.sessionControls.classList.add('hidden');
                elements.noSessionMessage.classList.remove('hidden');
                elements.currentSessionId.textContent = '-';
                elements.messageInput.disabled = true;
                elements.sendMessageBtn.disabled = true;
                elements.messagesContainer.innerHTML = `
                    <div class="text-gray-500 text-center py-8">
                        选择会话以查看历史消息
                    </div>
                `;
                elements.messageCount.textContent = '0';
                
                // 关闭事件流
                disconnectEventStream();
            }
            
            renderSessionsList();
        }

        // 创建会话
        async function createSession() {
            try {
                const response = await fetch(`${API_BASE}/session`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showNotification(`会话创建成功: ${data.sessionId.substring(0, 8)}...`, 'success');
                    await loadSessions();
                    selectSession(data.sessionId);
                } else {
                    throw new Error('创建会话失败');
                }
            } catch (error) {
                console.error('创建会话失败:', error);
                showNotification('创建会话失败', 'error');
            }
        }

        // 启动Agent
        async function startAgent() {
            if (!state.currentSessionId) return;
            
            try {
                const response = await fetch(`${API_BASE}/session/${state.currentSessionId}/start`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    showNotification('Agent 已启动', 'success');
                    await loadSessions();
                } else {
                    throw new Error('启动失败');
                }
            } catch (error) {
                console.error('启动Agent失败:', error);
                showNotification('启动Agent失败', 'error');
            }
        }

        // 停止Agent
        async function stopAgent() {
            if (!state.currentSessionId) return;
            
            try {
                const response = await fetch(`${API_BASE}/session/${state.currentSessionId}/stop`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    showNotification('Agent 已停止', 'success');
                    await loadSessions();
                } else {
                    throw new Error('停止失败');
                }
            } catch (error) {
                console.error('停止Agent失败:', error);
                showNotification('停止Agent失败', 'error');
            }
        }

        // 删除会话
        async function deleteSession() {
            if (!state.currentSessionId) return;
            
            if (!confirm('确定要删除这个会话吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/session/${state.currentSessionId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showNotification('会话已删除', 'success');
                    selectSession(null);
                    await loadSessions();
                } else {
                    throw new Error('删除失败');
                }
            } catch (error) {
                console.error('删除会话失败:', error);
                showNotification('删除会话失败', 'error');
            }
        }

        // 清除历史
        async function clearHistory() {
            if (!state.currentSessionId) return;
            
            try {
                const response = await fetch(`${API_BASE}/session/${state.currentSessionId}/history`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showNotification('历史已清除', 'success');
                    await loadHistory(state.currentSessionId);
                } else {
                    throw new Error('清除失败');
                }
            } catch (error) {
                console.error('清除历史失败:', error);
                showNotification('清除历史失败', 'error');
            }
        }

        // 加载历史消息
        async function loadHistory(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/session/${sessionId}/history`);
                if (response.ok) {
                    const data = await response.json();
                    renderMessages(data.history || []);
                }
            } catch (error) {
                console.error('加载历史失败:', error);
                elements.messagesContainer.innerHTML = `
                    <div class="text-red-500 text-center py-8">
                        加载历史消息失败
                    </div>
                `;
            }
        }

        // 渲染消息
        function renderMessages(messages) {
            elements.messagesContainer.innerHTML = '';
            elements.messageCount.textContent = messages.length;
            
            if (messages.length === 0) {
                elements.messagesContainer.innerHTML = `
                    <div class="text-gray-500 text-center py-8">
                        暂无消息记录
                    </div>
                `;
                return;
            }
            
            messages.forEach(message => {
                const messageElement = createMessageElement(message);
                elements.messagesContainer.appendChild(messageElement);
            });
            
            if (state.autoScroll) {
                elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
            }
        }

        // 创建消息元素
        function createMessageElement(message) {
            const div = document.createElement('div');
            div.className = 'mb-4';
            
            let content = '';
            let messageClass = '';
            let roleText = '';
            
            switch (message.role) {
                case 'user':
                    messageClass = 'message-user';
                    roleText = '用户';
                    content = `<div class="font-medium">${parseMarkdown(message.content)}</div>`;
                    break;
                    
                case 'assistant':
                    messageClass = 'message-assistant';
                    roleText = 'Assistant';
                    
                    if (message.reasoning_content) {
                        content += `
                            <div class="mb-2">
                                <div class="text-xs text-gray-500 mb-1">推理:</div>
                                <div class="text-gray-700">${parseMarkdown(message.reasoning_content)}</div>
                            </div>
                        `;
                    }
                    
                    if (message.content) {
                        content += `
                            <div>
                                <div class="text-xs text-gray-500 mb-1">回复:</div>
                                <div class="text-gray-800">${parseMarkdown(message.content)}</div>
                            </div>
                        `;
                    }
                    
                    if (message.tool_calls && message.tool_calls.length > 0) {
                        content += `
                            <div class="mt-2">
                                <div class="text-xs text-gray-500 mb-1">工具调用:</div>
                                ${message.tool_calls.map(tool => `
                                    <div class="bg-gray-50 p-2 rounded text-sm mb-1">
                                        <div class="font-medium">${tool.function.name}</div>
                                        <div class="text-gray-600 font-mono text-xs">${escapeHtml(tool.function.arguments)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    break;
                    
                case 'tool':
                    messageClass = 'message-tool';
                    roleText = '工具';
                    content = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="font-medium">工具调用: ${message.tool_call_id}</div>
                                <div class="text-gray-700 mt-1">${parseMarkdown(message.content)}</div>
                            </div>
                        </div>
                    `;
                    break;
            }
            
            div.innerHTML = `
                <div class="${messageClass} p-4 rounded-lg">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center">
                            <span class="text-sm font-medium text-gray-700">${roleText}</span>
                        </div>
                        <span class="text-xs text-gray-500">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    ${content}
                </div>
            `;
            
            return div;
        }

        // 处理消息输入
        function handleMessageInput() {
            const text = elements.messageInput.value;
            elements.charCount.textContent = text.length;
            
            if (text.length > 1000) {
                elements.messageInput.value = text.substring(0, 1000);
                elements.charCount.textContent = 1000;
                elements.charCount.classList.add('text-red-500');
            } else {
                elements.charCount.classList.remove('text-red-500');
            }
        }

        // 发送消息
        async function sendMessage() {
            if (!state.currentSessionId) return;
            
            const message = elements.messageInput.value.trim();
            if (!message) return;
            
            // 显示用户消息
            const userMessage = {
                role: 'user',
                content: message
            };
            elements.messagesContainer.appendChild(createMessageElement(userMessage));
            elements.messageCount.textContent = parseInt(elements.messageCount.textContent) + 1;
            
            // 清空输入框
            elements.messageInput.value = '';
            elements.charCount.textContent = '0';
            
            // 滚动到底部
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
            
            // 发送到后端
            try {
                const response = await fetch(`${API_BASE}/session/${state.currentSessionId}/message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: message })
                });
                
                if (!response.ok) {
                    throw new Error('发送消息失败');
                }
                
                showNotification('消息已发送', 'success');
            } catch (error) {
                console.error('发送消息失败:', error);
                showNotification('发送消息失败', 'error');
            }
        }

        // 连接事件流
        function connectEventStream(sessionId) {
            disconnectEventStream();
            
            updateStatus(elements.eventStreamStatus, '连接中...', false);
            
            state.eventSource = new EventSource(`${API_BASE}/session/${sessionId}/events`);
            
            state.eventSource.onopen = () => {
                updateStatus(elements.eventStreamStatus, '已连接', true);
            };
            
            state.eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleEvent(data);
                } catch (error) {
                    console.error('解析事件数据失败:', error);
                }
            };
            
            state.eventSource.onerror = (error) => {
                console.error('事件流错误:', error);
                updateStatus(elements.eventStreamStatus, '连接失败', false);
                state.eventSource.close();
            };
        }

        // 断开事件流
        function disconnectEventStream() {
            if (state.eventSource) {
                state.eventSource.close();
                state.eventSource = null;
            }
            updateStatus(elements.eventStreamStatus, '未连接', false);
        }

        // 处理事件 - 将事件流式融合到对话历史中
        function handleEvent(eventData) {
            const { type, data } = eventData;
            
            switch (type) {
                case 'llm_chunk':
                    handleLLMChunk(data);
                    break;
                case 'reasoning_chunk':
                    handleReasoningChunk(data);
                    break;
                case 'tool_result':
                    handleToolResult(data);
                    break;
                case 'message_received':
                    // 用户消息已发送，开始新的assistant消息
                    startNewAssistantMessage();
                    break;
                case 'tool_called':
                    // 工具调用，可以添加到缓冲区
                    if (data.toolName) {
                        state.toolCallsBuffer.push({
                            function: { name: data.toolName, arguments: data.arguments || '{}' }
                        });
                    }
                    break;
                // 其他系统事件可以忽略或显示为通知
                case 'agent_started':
                    showNotification('Agent 已启动', 'info');
                    break;
                case 'agent_stopped':
                    showNotification('Agent 已停止', 'info');
                    break;
            }
            
            // 滚动到最新内容
            if (state.autoScroll) {
                elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
            }
        }
        
        // 处理LLM输出块
        function handleLLMChunk(data) {
            if (!data.chunk) return;
            
            // 更新缓冲区
            state.llmBuffer += data.chunk;
            
            // 确保有当前的assistant消息元素
            if (!state.currentAssistantMessage) {
                startNewAssistantMessage();
            }
            
            // 更新显示
            updateAssistantMessageDisplay();
        }
        
        // 处理推理块
        function handleReasoningChunk(data) {
            if (!data.chunk) return;
            
            // 更新缓冲区
            state.reasoningBuffer += data.chunk;
            
            // 确保有当前的assistant消息元素
            if (!state.currentAssistantMessage) {
                startNewAssistantMessage();
            }
            
            // 更新显示
            updateAssistantMessageDisplay();
        }
        
        // 处理工具结果
        function handleToolResult(data) {
            if (!data.result) return;
            
            // 如果有正在进行的assistant消息，先完成它
            if (state.currentAssistantMessage) {
                completeAssistantMessage();
            }
            
            // 创建工具消息
            const toolMessage = {
                role: 'tool',
                content: data.result,
                tool_call_id: `tool_${Date.now()}`
            };
            
            const toolElement = createMessageElement(toolMessage);
            elements.messagesContainer.appendChild(toolElement);
            elements.messageCount.textContent = parseInt(elements.messageCount.textContent) + 1;
            
            // 清理缓冲区
            clearBuffers();
        }
        
        // 开始新的assistant消息
        function startNewAssistantMessage() {
            // 如果有正在进行的消息，先完成它
            if (state.currentAssistantMessage) {
                completeAssistantMessage();
            }
            
            // 创建新的assistant消息
            const messageTemplate = {
                role: 'assistant',
                content: '',
                reasoning_content: '',
                tool_calls: []
            };
            
            // 创建消息元素但不立即添加到DOM，先存储在状态中
            state.currentAssistantMessage = createMessageElement(messageTemplate);
            // 设置为隐藏，稍后更新内容后再显示
            state.currentAssistantMessage.style.display = 'none';
            
            // 重置缓冲区
            state.reasoningBuffer = '';
            state.llmBuffer = '';
            state.toolCallsBuffer = [];
        }
        
        // 更新assistant消息的显示
        function updateAssistantMessageDisplay() {
            if (!state.currentAssistantMessage) return;
            
            // 如果消息还是隐藏的，先添加到DOM并显示
            if (state.currentAssistantMessage.style.display === 'none') {
                elements.messagesContainer.appendChild(state.currentAssistantMessage);
                state.currentAssistantMessage.style.display = '';
                elements.messageCount.textContent = parseInt(elements.messageCount.textContent) + 1;
            }
            
            // 创建更新后的消息内容
            const updatedMessage = {
                role: 'assistant',
                content: state.llmBuffer,
                reasoning_content: state.reasoningBuffer,
                tool_calls: state.toolCallsBuffer.length > 0 ? state.toolCallsBuffer : undefined
            };
            
            // 替换消息元素的内容
            const newElement = createMessageElement(updatedMessage);
            state.currentAssistantMessage.innerHTML = newElement.innerHTML;
        }
        
        // 完成当前的assistant消息
        function completeAssistantMessage() {
            if (!state.currentAssistantMessage) return;
            
            // 确保消息完全显示
            updateAssistantMessageDisplay();
            
            // 重置当前消息引用
            state.currentAssistantMessage = null;
            
            // 注意：不清除缓冲区，因为可能还需要用于后续更新
        }
        
        // 清理缓冲区
        function clearBuffers() {
            state.reasoningBuffer = '';
            state.llmBuffer = '';
            state.toolCallsBuffer = [];
        }

        // 更新会话数量
        function updateSessionCount() {
            elements.sessionCount.textContent = state.sessions.length;
        }

        // 更新状态显示
        function updateStatus(element, text, isConnected) {
            const statusDot = element.querySelector('.status-dot');
            const statusText = element.querySelector('span:last-child');
            
            statusDot.className = `status-dot ${isConnected ? 'status-active' : 'status-inactive'}`;
            statusText.textContent = text;
        }

        // 显示通知
        function showNotification(message, type) {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg transition-all duration-300 transform translate-x-0 opacity-100 ${
                type === 'success' ? 'bg-green-50 text-green-800 border border-green-200' : 
                type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 
                'bg-gray-50 text-gray-800 border border-gray-200'
            }`;
            notification.innerHTML = `
                <div class="flex items-center">
                    <div class="mr-3">
                        ${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}
                    </div>
                    <div>${escapeHtml(message)}</div>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后移除
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Markdown解析
        function parseMarkdown(text) {
            if (!text || typeof text !== 'string') return '';
            try {
                // 使用marked解析Markdown
                return marked.parse(text, {
                    breaks: true,
                    gfm: true,
                    headerIds: false
                });
            } catch (error) {
                console.error('Markdown解析错误:', error);
                return escapeHtml(text);
            }
        }

        // 定期检查状态
        setInterval(() => {
            if (state.currentSessionId) {
                loadSessions();
            }
        }, 10000); // 每10秒检查一次
    </script>
</body>
</html>
